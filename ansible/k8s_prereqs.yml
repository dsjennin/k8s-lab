---
- name: Prepare Ubuntu nodes for kubeadm (containerd + kube tools)
  hosts: k8s_all
  become: true

  vars:
    k8s_version_channel: "v1.29"

  tasks:
    - name: Disable swap now (ignore if none)
      command: swapoff -a
      changed_when: false
      failed_when: false

    - name: Comment swap in /etc/fstab
      replace:
        path: /etc/fstab
        regexp: '^\s*([^#]\S+\s+\S+\s+swap\s+\S+.*)$'
        replace: '# \1'

    - name: Install base packages
      apt:
        name:
          - ca-certificates
          - curl
          - gpg
          - apt-transport-https
        state: present
        update_cache: true

    - name: Load kernel modules now
      modprobe:
        name: "{{ item }}"
        state: present
      loop:
        - overlay
        - br_netfilter

    - name: Persist kernel modules
      copy:
        dest: /etc/modules-load.d/k8s.conf
        content: |
          overlay
          br_netfilter

    - name: Sysctl settings for Kubernetes
      copy:
        dest: /etc/sysctl.d/k8s.conf
        content: |
          net.bridge.bridge-nf-call-iptables  = 1
          net.bridge.bridge-nf-call-ip6tables = 1
          net.ipv4.ip_forward                 = 1

    - name: Apply sysctl
      command: sysctl --system
      changed_when: false

    - name: Install containerd
      apt:
        name: containerd
        state: present

    - name: Ensure containerd config exists
      shell: |
        mkdir -p /etc/containerd
        test -f /etc/containerd/config.toml || containerd config default > /etc/containerd/config.toml
      args:
        creates: /etc/containerd/config.toml

    - name: Set SystemdCgroup = true in containerd config
      replace:
        path: /etc/containerd/config.toml
        regexp: 'SystemdCgroup = false'
        replace: 'SystemdCgroup = true'

    - name: Enable and restart containerd
      systemd:
        name: containerd
        enabled: true
        state: restarted

    - name: Create keyrings directory
      file:
        path: /etc/apt/keyrings
        state: directory
        mode: "0755"

    - name: Add Kubernetes repo keyring
      shell: |
        curl -fsSL https://pkgs.k8s.io/core:/stable:/{{ k8s_version_channel }}/deb/Release.key \
          | gpg --dearmor -o /etc/apt/keyrings/kubernetes-apt-keyring.gpg
      args:
        creates: /etc/apt/keyrings/kubernetes-apt-keyring.gpg

    - name: Write kubernetes.list as ONE line (fixes malformed Suite errors)
      copy:
        dest: /etc/apt/sources.list.d/kubernetes.list
        content: "deb [signed-by=/etc/apt/keyrings/kubernetes-apt-keyring.gpg] https://pkgs.k8s.io/core:/stable:/{{ k8s_version_channel }}/deb/ /\n"

    - name: Install kubelet/kubeadm/kubectl
      apt:
        name:
          - kubelet
          - kubeadm
          - kubectl
        state: present
        update_cache: true

    - name: Hold kube packages
      command: apt-mark hold kubelet kubeadm kubectl
      changed_when: false