<svg width="1200" height="720" viewBox="0 0 1200 720" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#111"/>
    </marker>
    <style>
      .box { fill: #fff; stroke: #111; stroke-width: 2; rx: 16; ry: 16; }
      .title { font: 700 20px -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial, sans-serif; fill: #111; }
      .text { font: 14px -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial, sans-serif; fill: #111; }
      .small { font: 12px -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial, sans-serif; fill: #111; }
      .line { stroke: #111; stroke-width: 2.5; fill: none; marker-end: url(#arrow); }
      .line2 { stroke: #111; stroke-width: 2.5; fill: none; marker-end: url(#arrow); stroke-dasharray: 6 6; }
      .rack { fill: #f7f7f7; stroke: #111; stroke-width: 2; rx: 22; ry: 22; }
      .slot { fill: #fff; stroke: #111; stroke-width: 1.5; rx: 14; ry: 14; }
      .muted { fill: #444; }
    </style>
  </defs>

  <!-- Header -->
  <text x="40" y="48" class="title">Homelab Network + Rack Diagram (Proxmox → Kubernetes)</text>
  <text x="40" y="74" class="text">Physical: Router → Switch → Proxmox cluster (3× HP EliteDesk). Logical: VMs on Proxmox form a kubeadm cluster.</text>

  <!-- WAN / Internet -->
  <rect x="70" y="120" width="240" height="78" class="box"/>
  <text x="92" y="155" class="text">Internet / ISP</text>
  <text x="92" y="178" class="small">WAN uplink</text>

  <!-- Router -->
  <rect x="380" y="110" width="260" height="98" class="box"/>
  <text x="402" y="150" class="text">Netgear R9000 Router</text>
  <text x="402" y="173" class="small">LAN: 192.168.1.1/24</text>
  <text x="402" y="193" class="small">DHCP reservations recommended</text>

  <!-- Switch -->
  <rect x="710" y="110" width="260" height="98" class="box"/>
  <text x="732" y="150" class="text">Switch (GS305)</text>
  <text x="732" y="173" class="small">Layer-2 access switch</text>
  <text x="732" y="193" class="small">All lab nodes wired</text>

  <!-- Lines top -->
  <path d="M 310 159 L 380 159" class="line"/>
  <path d="M 640 159 L 710 159" class="line"/>

  <!-- Rack container -->
  <rect x="70" y="250" width="900" height="410" class="rack"/>
  <text x="95" y="286" class="text">T1 Rack (physical)</text>

  <!-- Rack slots -->
  <rect x="95" y="310" width="850" height="70" class="slot"/>
  <text x="120" y="342" class="text">PVE-1 (HP EliteDesk) — 192.168.1.10</text>
  <text x="120" y="365" class="small">Proxmox node • vmbr0 bridged to LAN</text>

  <rect x="95" y="395" width="850" height="70" class="slot"/>
  <text x="120" y="427" class="text">PVE-2 (HP EliteDesk) — 192.168.1.11</text>
  <text x="120" y="450" class="small">Proxmox node • clustered with PVE-1</text>

  <rect x="95" y="480" width="850" height="70" class="slot"/>
  <text x="120" y="512" class="text">PVE-3 (HP EliteDesk) — 192.168.1.12</text>
  <text x="120" y="535" class="small">Proxmox node • quorum = 3 nodes</text>

  <rect x="95" y="565" width="850" height="70" class="slot"/>
  <text x="120" y="597" class="text">Optional: Admin workstation (or laptop via Wi‑Fi)</text>
  <text x="120" y="620" class="small">SSH + browser to Proxmox UI: https://192.168.1.10:8006</text>

  <!-- Switch to rack uplinks -->
  <path d="M 840 208 L 840 310" class="line"/>
  <text x="858" y="260" class="small muted">LAN uplinks</text>

  <!-- Logical Kubernetes box -->
  <rect x="1000" y="250" width="170" height="410" class="box"/>
  <text x="1018" y="286" class="text">Logical (VMs)</text>
  <text x="1018" y="312" class="small">Kubernetes (kubeadm)</text>

  <rect x="1015" y="340" width="140" height="70" class="slot"/>
  <text x="1026" y="370" class="small"><tspan font-weight="700">k8s-cp1</tspan></text>
  <text x="1026" y="392" class="small">192.168.1.21</text>

  <rect x="1015" y="430" width="140" height="70" class="slot"/>
  <text x="1026" y="460" class="small"><tspan font-weight="700">k8s-worker1</tspan></text>
  <text x="1026" y="482" class="small">192.168.1.22</text>

  <rect x="1015" y="520" width="140" height="70" class="slot"/>
  <text x="1026" y="550" class="small"><tspan font-weight="700">k8s-worker2</tspan></text>
  <text x="1026" y="572" class="small">192.168.1.23</text>

  <!-- Dashed line from PVE nodes to logical VMs -->
  <path d="M 945 345 L 1000 375" class="line2"/>
  <path d="M 945 430 L 1000 465" class="line2"/>
  <path d="M 945 515 L 1000 555" class="line2"/>
  <text x="985" y="330" class="small muted" text-anchor="end">VMs hosted on Proxmox</text>

  <!-- Footer note -->
  <text x="40" y="700" class="small muted">Tip: Keep Proxmox cluster traffic and VM traffic wired (Ethernet). Avoid Wi‑Fi for Proxmox management interfaces.</text>
</svg>
